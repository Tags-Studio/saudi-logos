                <stop offset="0%" stop-color="#1e40af"/>
                <stop offset="100%" stop-color="#1d4ed8"/>
            </linearGradient>
        </defs>
        <path d="M200,50 C280,50 320,100 320,180 C320,260 250,330 200,350 C150,330 80,260 80,180 C80,100 120,50 200,50 Z" fill="url(#hilal-blue)"/>
