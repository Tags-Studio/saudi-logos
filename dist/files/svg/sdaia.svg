                <stop offset="0%" stop-color="#0284c7"/>
                <stop offset="100%" stop-color="#0f766e"/>
            </linearGradient>
        </defs>
        <!-- Data nodes and neural network theme -->
        <g transform="translate(200, 160)" stroke="url(#sdaia-grad)" stroke-width="4" fill="none">
