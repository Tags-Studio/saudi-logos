<div class="container">
  <div class="form-card">
    <h1 class="form-title">اتصل بنا</h1>
    <p class="form-subtitle">يسعدنا تلقي استفساراتكم وملاحظاتكم حول خدمات المكتبة، أو الإبلاغ عن أي شعار بحاجة لتحديث.</p>
    
    <form id="contact-form" onsubmit="event.preventDefault(); alert('شكرًا لتواصلك معنا! سنرد عليك في أقرب وقت.'); this.reset();">
      <div class="form-group">
        <label for="contact-name" class="form-label">الاسم الكامل: *</label>
        <input type="text" id="contact-name" class="form-control" placeholder="مثال: أحمد الحربي" required>
      </div>

      <div class="form-group">
        <label for="contact-email" class="form-label">البريد الإلكتروني: *</label>
        <input type="email" id="contact-email" class="form-control" placeholder="name@example.com" required style="direction: ltr; text-align: right;">
      </div>

      <div class="form-group">
        <label for="contact-subject" class="form-label">الموضوع: *</label>
        <input type="text" id="contact-subject" class="form-control" placeholder="عنوان رسالتك..." required>
      </div>

      <div class="form-group">
        <label for="contact-message" class="form-label">نص الرسالة: *</label>
        <textarea id="contact-message" class="form-control" rows="5" placeholder="اكتب تفاصيل رسالتك هنا..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">إرسال الرسالة</button>
    </form>
  </div>
</div>
